name: V2er
options:
  bundleIdPrefix: v2er
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  developmentLanguage: zh-Hans

configFiles:
  Debug: Version.xcconfig
  Release: Version.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    DEVELOPMENT_TEAM: DZCZQ4694Z
    CODE_SIGN_STYLE: Automatic

packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    branch: master
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    version: 2.0.0
  SwiftUI-WebView:
    url: https://github.com/kylehickinson/SwiftUI-WebView
    version: 0.3.0
  SwiftRichText:
    url: https://github.com/sethcreate/SwiftRichText
    revision: 86d3f06a48d1641e348f162afc99832b42cb9ce9

targets:
  V2er:
    type: application
    platform: auto
    supportedDestinations: [iOS, macOS]
    sources:
      - path: V2er
        excludes:
          - "**/.DS_Store"
          - "Views/Platform/*_iOS.swift"
          - "Views/Platform/*_macOS.swift"
          - "Views/Platform/MenuBarCommands.swift"
      # iOS-only source files
      - path: V2er/Views/Platform/RootView_iOS.swift
        destinationFilters: [iOS]
      # macOS-only source files
      - path: V2er/Views/Platform/RootView_macOS.swift
        destinationFilters: [macOS]
      - path: V2er/Views/Platform/MenuBarCommands.swift
        destinationFilters: [macOS]
    dependencies:
      - package: Kingfisher
      - package: SwiftSoup
      - package: SwiftUI-WebView
        product: WebView
      - package: SwiftRichText
        product: Atributika
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: v2er.app
        PRODUCT_NAME: V2er
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: V2er/V2er-iOS.entitlements
        CODE_SIGN_ENTITLEMENTS[sdk=macosx*]: V2er/V2er-macOS.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
      configs:
        Debug:
          ENABLE_HARDENED_RUNTIME: false
        Release:
          ENABLE_HARDENED_RUNTIME: true
    info:
      path: V2er/Info.plist
      properties:
        CFBundleName: V2er
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        # iOS-specific (ignored on macOS)
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIViewControllerBasedStatusBarAppearance: true
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - v2er.app.dailyHotRefresh
        LSApplicationQueriesSchemes:
          - googleauthenticator
          - msauth
          - authy
          - onepassword
        # macOS-specific (ignored on iOS)
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: "Copyright © 2024 lessmore.io. All rights reserved."
        LSApplicationCategoryType: public.app-category.social-networking

  V2erTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: V2erTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: V2er
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.lessmore.V2erTests
        PRODUCT_NAME: V2erTests

  V2erUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: V2erUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: V2er
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.lessmore.V2erUITests
        PRODUCT_NAME: V2erUITests
        TEST_TARGET_NAME: V2er

schemes:
  V2er-iOS:
    build:
      targets:
        V2er: all
        V2erUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - V2erTests
        - V2erUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  V2er-macOS:
    build:
      targets:
        V2er: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
